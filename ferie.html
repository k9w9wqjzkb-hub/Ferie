<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>iWork - Storico Ferie</title>
  <link rel="stylesheet" href="style.css?v=19">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" sizes="180x180" href="icon-180.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body data-page="ferie">

  <header class="ios-navbar">
    <div class="nav-content">
      <span class="nav-brand">Storico</span>
      <div class="user-switch">
        <select id="userSelect" class="user-select" aria-label="Utente"></select>
        <button id="userAddBtn" class="user-add" aria-label="Aggiungi utente">＋</button>
      </div>
    </div>
  </header>

  <main class="main-content">
    <header class="dashboard-header">
      <p class="date-subtitle">Riepilogo Residui</p>
      <h1 class="large-title">Ferie e ROL</h1>
    </header>

    <section class="ios-card-grid">
      <div class="ios-card" style="border-left:4px solid var(--blue);">
        <span class="card-label" style="color:var(--blue)">Ferie (gg)</span>
        <span class="value" id="val-ferie">--</span>
        <span class="subvalue" id="val-ferie-pian">Prev: --</span>
      </div>
      <div class="ios-card" style="border-left:4px solid var(--orange);">
        <span class="card-label" style="color:var(--orange)">Permessi (gg)</span>
        <span class="value" id="val-rol">--</span>
        <span class="subvalue" id="val-rol-pian">Prev: --</span>
      </div>
    </section>

    <div class="filter-bar">
      <select class="ios-select" id="filter-tipo" style="flex:1.5;">
        <option value="all">Tutte</option>
        <option value="ferie">Ferie (Tutte)</option>
        <option value="rol">Permessi</option>
        <option value="conto">Perm.B.Ore</option>
        <option value="maturazione">Maturazioni</option>
      </select>
      <select class="ios-select" id="filter-anno" style="flex:1;"></select>
    </div>

    <div class="ios-card" style="margin:0 16px; padding:0; overflow:hidden;">
      <table style="width:100%; border-collapse:collapse;">
        <tbody id="history-body"></tbody>
      </table>
    </div>
  </main>

  <button class="ios-fab" onclick="toggleModal(true)" aria-label="Aggiungi record">+</button>

  <div id="modal-overlay" class="modal-backdrop" onclick="toggleModal(false)"></div>
  <div id="add-modal" class="ios-page-sheet" style="height:75%;">
    <div class="modal-nav">
      <button class="btn-link" onclick="toggleModal(false)">Annulla</button>
      <span class="modal-title">Nuovo Record</span>
      <button class="btn-link" style="font-weight:700;" onclick="saveData()">Aggiungi</button>
    </div>
    <div class="sheet-body" style="padding:20px; height:calc(100% - 52px);">
      <div class="ios-input-group">
        <div class="ios-input-row">
          <label>Tipo</label>
          <select id="in-tipo" onchange="gestisciAutoOre()">
            <option value="ferie">Ferie (Personali)</option>
            <option value="ferie_az">Ferie (Aziendali)</option>
            <option value="rol">Permessi (ROL)</option>
            <option value="conto">Perm.B.Ore</option>
            <option value="malattia">Malattia</option>
            <option value="avis">🩸 AVIS</option>
            <option value="maturazione">➕ Maturazione</option>
          </select>
        </div>
        <div class="ios-input-row">
          <label>Ore</label>
          <input type="number" id="in-ore" step="0.01" placeholder="0.00">
        </div>
        <div class="ios-input-row">
          <label>Data</label>
          <input type="date" id="in-data">
        </div>
        <div class="ios-input-row">
          <label>Note</label>
          <input type="text" id="in-note" placeholder="Opzionale">
        </div>
        <div class="ios-input-row">
          <label>Solo Pianificato</label>
          <input type="checkbox" id="in-pianificato" style="width:20px;height:20px;flex-shrink:0;">
        </div>
      </div>
    </div>
  </div>

  <nav class="tab-bar">
    <div class="liquid-indicator"></div>
    <a href="index.html"     class="tab-item">🏠<span>Home</span></a>
    <a href="ferie.html"     class="tab-item active">📅<span>Ferie</span></a>
    <a href="malattia.html"  class="tab-item">🤒<span>Malattia</span></a>
    <a href="calendario.html" class="tab-item">🗓️<span>Calendario</span></a>
  </nav>

  <script src="app.js?v=19"></script>
</body>
</html>
